<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V0ID_SCALE LABS — Alien Dragon Instrument</title>
    <style>
        :root {
            --void-black: #0a0e14;
            --void-deep: #0f1419;
            --void-surface: #151c26;
            --void-border: #1e2633;
            --plasma-green: #00ff41;
            --plasma-purple: #9d4edd;
            --plasma-cyan: #00d9ff;
            --plasma-red: #ff006e;
            --plasma-gold: #ffb703;
            --text-void: #c8d6e5;
            --text-dim: #6c757d;
            --glyph-color: #00ff41;
            --radius-alien: 3px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--void-black);
            color: var(--text-void);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(180deg, #0f1419 0%, #151c26 100%);
            padding: 12px 16px;
            border-bottom: 1px solid var(--plasma-purple);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.15);
        }

        h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--plasma-green);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 12px;
            padding: 12px;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        @media (max-width: 720px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            .container { flex-direction: column; overflow: visible; }
            .main-panel { overflow: visible; }
            .sidebar { width: 100%; overflow-y: visible; }
        }

        .panel {
            background: var(--void-surface);
            border: 1px solid var(--void-border);
            border-radius: var(--radius-alien);
            padding: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--plasma-purple), transparent);
            opacity: 0.3;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--plasma-cyan);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
        }

        .glyph {
            display: inline-block;
            font-size: 14px;
            margin-right: 4px;
            color: var(--plasma-green);
            text-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
        }

        .ouroboros-display {
            width: 100%;
            height: 140px;
            background: rgba(15, 20, 25, 0.8);
            border: 1px solid var(--plasma-purple);
            border-radius: var(--radius-alien);
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .ouroboros-canvas {
            width: 100%;
            height: 100%;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            background: var(--void-black);
            border: 1px solid var(--void-border);
            color: var(--text-void);
            padding: 6px 8px;
            border-radius: var(--radius-alien);
            font-size: 12px;
            font-family: 'Courier New', monospace;
            transition: all 200ms ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--plasma-cyan);
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
        }

        input[type="range"] {
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: var(--void-border);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--plasma-cyan);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--plasma-cyan);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.6);
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid var(--void-border);
            background: var(--void-black);
            color: var(--plasma-green);
            border-radius: var(--radius-alien);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 150ms ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn:hover {
            border-color: var(--plasma-cyan);
            color: var(--plasma-cyan);
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.3);
        }

        .btn.active {
            background: var(--plasma-cyan);
            color: var(--void-black);
            box-shadow: 0 0 16px rgba(0, 217, 255, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tempo-display {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--plasma-green);
            text-shadow: 0 0 12px rgba(0, 255, 65, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .time-sig-display {
            font-size: 16px;
            text-align: center;
            color: var(--plasma-cyan);
            font-family: monospace;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
        }

        .waveform-canvas {
            width: 100%;
            height: 80px;
            background: rgba(15, 20, 25, 0.8);
            border: 1px solid var(--void-border);
            border-radius: var(--radius-alien);
            display: block;
            cursor: crosshair;
        }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .pad {
            aspect-ratio: 1;
            background: var(--void-black);
            border: 1px solid var(--void-border);
            border-radius: var(--radius-alien);
            cursor: pointer;
            transition: all 80ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .pad:hover {
            border-color: var(--plasma-cyan);
            background: rgba(0, 217, 255, 0.1);
        }

        .pad:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pad.active {
            background: var(--plasma-green);
            color: var(--void-black);
            border-color: var(--plasma-green);
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.6), inset 0 0 8px rgba(0, 0, 0, 0.5);
        }

        .pad.heat {
            animation: heat-fade 0.4s ease-out;
        }

        @keyframes heat-fade {
            0% { background: var(--plasma-red); box-shadow: 0 0 20px rgba(255, 0, 110, 0.8); }
            100% { background: transparent; box-shadow: none; }
        }

        .euclidean-viz {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 2px;
            margin-top: 8px;
        }

        .euclidean-step {
            aspect-ratio: 1;
            background: var(--void-black);
            border: 1px solid var(--void-border);
            border-radius: 2px;
            transition: all 100ms ease;
        }

        .euclidean-step.active {
            background: var(--plasma-purple);
            border-color: var(--plasma-purple);
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.5);
        }

        .euclidean-step.playhead {
            border-color: var(--plasma-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.7);
        }

        .euclidean-step.active.playhead {
            background: var(--plasma-green);
        }

        .scrollable {
            flex: 1;
            overflow-y: auto;
        }

        .track-item {
            background: var(--void-black);
            border: 1px solid var(--void-border);
            border-radius: var(--radius-alien);
            padding: 8px;
            margin-bottom: 6px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-label {
            color: var(--plasma-cyan);
            font-weight: 600;
        }

        .track-stats {
            color: var(--text-dim);
            font-size: 10px;
        }

        .track-item {
            cursor: pointer;
        }

        .track-item.armed {
            border-color: var(--plasma-green);
            box-shadow: inset 3px 0 0 var(--plasma-green);
        }

        .track-arm {
            color: var(--text-dim);
            font-size: 9px;
            letter-spacing: 0.5px;
        }

        .track-item.armed .track-arm {
            color: var(--plasma-green);
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 16px;
            font-size: 11px;
        }

        .status-line {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: monospace;
        }

        .success {
            color: var(--plasma-green);
        }

        .warning {
            color: var(--plasma-gold);
        }

        .error {
            color: var(--plasma-red);
        }

        .file-zone {
            border: 1px dashed var(--void-border);
            border-radius: var(--radius-alien);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .file-zone:hover {
            border-color: var(--plasma-cyan);
            background: rgba(0, 217, 255, 0.05);
        }

        .file-zone.dragover {
            border-color: var(--plasma-green);
            background: rgba(0, 255, 65, 0.1);
        }

        .file-list {
            max-height: 100px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            background: var(--void-black);
            border: 1px solid var(--void-border);
            border-radius: var(--radius-alien);
            margin-bottom: 3px;
            font-size: 10px;
        }

        .file-name {
            flex: 1;
            color: var(--text-dim);
            word-break: break-all;
        }

        .file-delete {
            background: transparent;
            border: none;
            color: var(--plasma-red);
            cursor: pointer;
            font-size: 10px;
            margin-left: 6px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--void-black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--void-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--plasma-purple);
        }
    </style>
</head>
<body>
    <header>
        <h1><span class="glyph">◇</span> V0ID_SCALE <span class="glyph">✦</span> LABS</h1>
    </header>

    <div class="container">
        <!-- MAIN PANEL -->
        <div class="main-panel">
            <!-- OUROBOROS / BREATH CYCLE -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">◈</span> Dragon's Heart</div>
                <div class="ouroboros-display">
                    <canvas id="ouroboros" class="ouroboros-canvas"></canvas>
                </div>
                <div class="control-row">
                    <div class="control-group">
                        <label>Breath Tempo</label>
                        <div class="tempo-display" id="tempoDisplay">96</div>
                    </div>
                    <div class="control-group">
                        <label>Time Signature</label>
                        <div class="time-sig-display" id="timeSigDisplay">4/4</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn" id="playBtn">▶ Play</button>
                    <button class="btn" id="stopBtn">⏹ Stop</button>
                    <button class="btn" id="recordBtn">● Record</button>
                </div>
            </div>

            <!-- WAVEFORM VISUALIZER -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">≈</span> Void Resonator</div>
                <canvas id="waveform" class="waveform-canvas"></canvas>
            </div>

            <!-- EUCLIDEAN CYCLES -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">◐</span> Euclidean Cycles</div>
                <div class="control-row">
                    <div class="control-group">
                        <label>Density</label>
                        <input type="number" id="euclideanDensity" value="5" min="1" max="16">
                    </div>
                    <div class="control-group">
                        <label>Cycle Length</label>
                        <input type="number" id="euclideanLength" value="16" min="1" max="32">
                    </div>
                </div>
                <div class="euclidean-viz" id="euclideanViz"></div>
            </div>

            <!-- LOOPER TRACKS -->
            <div class="panel scrollable">
                <div class="panel-title"><span class="glyph">∞</span> Crystallized Loops</div>
                <div id="trackList" class="scrollable">
                    <div class="empty-state">⚬ No loops yet</div>
                </div>
                <button class="btn" id="clearAllBtn" style="margin-top: 8px; width: 100%;">🗑 Clear All</button>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- TEMPO & TIMING -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">⧗</span> Breath Control</div>
                <div class="control-group">
                    <label>Tempo (BPM)</label>
                    <input type="range" id="tempoSlider" min="40" max="240" value="96">
                    <input type="number" id="tempoBPM" value="96" min="40" max="240">
                </div>
                <div class="control-group">
                    <label>Beats Per Bar</label>
                    <select id="beatsSelect">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4" selected>4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Note Division</label>
                    <select id="divisionSelect">
                        <option value="4">Quarter</option>
                        <option value="8" selected>Eighth</option>
                        <option value="16">Sixteenth</option>
                        <option value="32">32nd</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Master Volume</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="25">
                    <div style="display: flex; gap: 6px; align-items: center; margin-top: 6px;">
                        <button class="btn" id="muteBtn" style="flex: 1;">MUTE</button>
                        <span class="status-line" id="volumeReadout" style="min-width: 42px; text-align: right;">25%</span>
                    </div>
                </div>
            </div>

            <!-- SCALE GRID / XENOMORPHIC MAPPER -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">◆</span> Scale Grid</div>
                <div class="control-group">
                    <label>Instrument</label>
                    <select id="instrumentSelect">
                        <option value="piano">Piano</option>
                        <option value="synth">Synth</option>
                        <option value="drums">Drums</option>
                        <option value="hirajoshi">Hirajoshi (Alien)</option>
                        <option value="just">Just Intonation</option>
                    </select>
                </div>
                <div class="pad-grid">
                    <button class="pad" data-note="60" data-name="C">C</button>
                    <button class="pad" data-note="62" data-name="D">D</button>
                    <button class="pad" data-note="64" data-name="E">E</button>
                    <button class="pad" data-note="65" data-name="F">F</button>
                    <button class="pad" data-note="67" data-name="G">G</button>
                    <button class="pad" data-note="69" data-name="A">A</button>
                    <button class="pad" data-note="71" data-name="B">B</button>
                    <button class="pad" data-note="72" data-name="C5">C5</button>
                </div>
            </div>

            <!-- AI / SHADOW -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">⚡</span> The Shadow</div>
                <div class="control-group">
                    <label>Vibe</label>
                    <input type="text" id="aiPrompt" placeholder="dark ambient" value="dark ambient">
                </div>
                <div class="control-group">
                    <label>Model (OpenRouter)</label>
                    <input type="text" id="aiModel" placeholder="openai/gpt-4o-mini" value="openai/gpt-4o-mini">
                </div>
                <div class="control-group">
                    <label>OpenRouter Key (local only)</label>
                    <input type="password" id="aiKey" placeholder="sk-or-...">
                </div>
                <button class="btn" id="generateBtn" style="width: 100%;">✨ Summon</button>
                <div id="aiStatus" class="status-line"></div>
            </div>

            <!-- FILE UPLOAD -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">📁</span> Upload Seeds</div>
                <div class="file-zone" id="dropZone">
                    <small>Drop or click</small>
                    <input type="file" id="fileInput" accept=".wav,.mp3,.mid,.midi" style="display: none;">
                </div>
                <div id="fileList" class="file-list"></div>
            </div>

            <!-- EXPORT / CRYSTALLIZE -->
            <div class="panel">
                <div class="panel-title"><span class="glyph">◎</span> Crystallize</div>
                <button class="btn" id="exportWavBtn" style="width: 100%;">🔮 WAV</button>
                <button class="btn" id="exportMidiBtn" style="width: 100%; margin-top: 6px;">🔮 MIDI</button>
                <button class="btn" id="downloadHtmlBtn" style="width: 100%; margin-top: 6px;">DOWNLOAD .HTML</button>
                <div id="exportStatus" class="status-line"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== AUDIO CONTEXT =====
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const masterGain = audioContext.createGain();
        masterGain.gain.value = 0.4;

        const compressor = audioContext.createDynamicsCompressor();
        compressor.threshold.value = -18;
        compressor.knee.value = 6;
        compressor.ratio.value = 4;
        compressor.attack.value = 0.005;
        compressor.release.value = 0.15;

        const convolver = audioContext.createConvolver();
        const reverbGain = audioContext.createGain();
        reverbGain.gain.value = 0.22;
        (function() {
            const sr = audioContext.sampleRate;
            const len = Math.floor(sr * 1.8);
            const buf = audioContext.createBuffer(2, len, sr);
            for (let c = 0; c < 2; c++) {
                const d = buf.getChannelData(c);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
            }
            convolver.buffer = buf;
        })();
        masterGain.connect(compressor);
        masterGain.connect(convolver);
        convolver.connect(reverbGain);
        reverbGain.connect(compressor);
        compressor.connect(audioContext.destination);

        // ===== ANALYSER FOR WAVEFORM VIZ =====
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        masterGain.connect(analyser);

        // ===== STATE =====
        const state = {
            tempo: 96,
            beatsPerBar: 4,
            noteDivision: 8,
            isPlaying: false,
            isRecording: false,
            recordedNotes: [],
            tracks: [],
            uploadedFiles: [],
            currentInstrument: 'piano',
            euclidDensity: 5,
            euclidLength: 16,
            grid: [],
            steps: 16,
            instrumentMaps: {
                piano: [60, 62, 64, 65, 67, 69, 71, 72],
                synth: [36, 38, 40, 42, 44, 45, 47, 48],
                drums: [36, 38, 42, 46, 49, 51, 53, 55],
                hirajoshi: [60, 61, 65, 67, 72],
                just: [60, 66, 70, 72, 80]
            }
        };

        // ===== INITIALIZATION =====
        function init() {
            updateTiming();
            renderEuclidean();
            drawOuroboros();
            drawWaveform();
            setupEventListeners();
            if (navigator.requestMIDIAccess) {
                navigator.requestMIDIAccess().then(onMidiSuccess, onMidiFailure);
            }
        }

        function setupEventListeners() {
            document.getElementById('playBtn').addEventListener('click', () => {
                if (transport.running) {
                    stopTransport();
                    document.getElementById('playBtn').classList.remove('active');
                } else {
                    startTransport();
                    document.getElementById('playBtn').classList.add('active');
                }
            });

            document.getElementById('stopBtn').addEventListener('click', () => {
                stopTransport();
                state.isRecording = false;
                document.getElementById('playBtn').classList.remove('active');
                document.getElementById('recordBtn').classList.remove('active');
            });

            document.getElementById('recordBtn').addEventListener('click', () => {
                if (!state.isRecording) {
                    state.isRecording = true;
                    state.recordedNotes = [];
                    document.getElementById('recordBtn').classList.add('active');
                } else {
                    state.isRecording = false;
                    saveTrack();
                    document.getElementById('recordBtn').classList.remove('active');
                }
            });

            document.getElementById('tempoSlider').addEventListener('input', (e) => {
                document.getElementById('tempoBPM').value = e.target.value;
                updateTiming();
            });

            document.getElementById('tempoBPM').addEventListener('change', (e) => {
                document.getElementById('tempoSlider').value = e.target.value;
                updateTiming();
            });

            document.getElementById('beatsSelect').addEventListener('change', updateTiming);
            document.getElementById('divisionSelect').addEventListener('change', updateTiming);

            document.getElementById('instrumentSelect').addEventListener('change', (e) => {
                state.currentInstrument = e.target.value;
                const pads = document.querySelectorAll('.pad');
                const map = state.instrumentMaps[state.currentInstrument];
                pads.forEach((pad, idx) => {
                    if (idx < map.length) {
                        pad.dataset.note = map[idx];
                        pad.textContent = midiToNote(map[idx]);
                        pad.disabled = false;
                    } else {
                        pad.dataset.note = '';
                        pad.textContent = '';
                        pad.disabled = true;
                    }
                });
            });

            document.querySelectorAll('.pad').forEach(pad => {

            document.getElementById('generateBtn').addEventListener('click', generateAI);
            document.getElementById('clearAllBtn').addEventListener('click', () => {
                if (confirm('Clear all loops?')) {

                }

            // File handling
            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', (e) => handleFiles(e.target.files));
            dropZone.addEventListener('dragover', (e) => {

            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {

            document.getElementById('exportWavBtn').addEventListener('click', exportWAV);

        // ===== TIMING =====
        function updateTiming() {
            state.tempo = parseInt(document.getElementById('tempoBPM').value);
            state.beatsPerBar = parseInt(document.getElementById('beatsSelect').value);
            state.noteDivision = parseInt(document.getElementById('divisionSelect').value);
            document.getElementById('tempoDisplay').textContent = state.tempo;
            document.getElementById('timeSigDisplay').textContent = `${state.beatsPerBar}/4`;
            rebuildGrid();
        }

        // ===== TRANSPORT (lookahead step sequencer) =====
        // The instrument plays a looping grid whose length is the Euclidean
        // "cycle length". Each step can carry several voices: the Euclidean
        // pulse (a kick) plus the notes of every armed loop, quantized onto the
        // same grid. A setTimeout tick schedules audio events slightly ahead on
        // the audio clock ("a tale of two clocks") for steady timing.
        const transport = { running: false, current: 0, nextTime: 0, timer: null };
        const LOOKAHEAD = 0.1;   // seconds scheduled ahead of the audio clock
        const TICK_MS = 25;      // how often the scheduler wakes up

        function stepDuration() {
            const secondsPerQuarter = 60 / Math.max(1, state.tempo);
            const div = state.noteDivision || 8;
            return secondsPerQuarter * 4 / div;
        }

        // Rebuild the step grid from the Euclidean pattern + armed loops. Each
        // cell is an array of { note, velocity, instrument } voices. Loops are
        // quantized by their real elapsed time onto the current grid, so a loop
        // recorded at any tempo lands sensibly at the current tempo/division.
        function rebuildGrid() {
            const steps = Math.max(1, state.euclidLength | 0);
            const grid = [];
            for (let i = 0; i < steps; i++) grid.push([]);
            const pat = euclideanPattern(state.euclidDensity, steps);
            for (let i = 0; i < steps; i++) {
                if (pat[i]) grid[i].push({ note: 36, velocity: 112, instrument: 'drums' });
            }
            const dur = stepDuration();
            (state.tracks || []).forEach((tr) => {
                if (tr.armed === false) return;
                if (!tr.notes || !tr.notes.length) return;
                const t0 = tr.notes[0].time;
                const inst = tr.instrument || 'piano';
                tr.notes.forEach((n) => {
                    const relSec = (n.time - t0) / 1000;
                    let idx = Math.round(relSec / dur) % steps;
                    idx = ((idx % steps) + steps) % steps;
                    grid[idx].push({ note: n.note, velocity: n.velocity, instrument: inst });
                });
            });
            state.grid = grid;
            state.steps = steps;
        }

        function highlightEuclidStep(stepIndex, when) {
            const delay = Math.max(0, (when - audioContext.currentTime) * 1000);
            setTimeout(() => {
                const cells = document.querySelectorAll('#euclideanViz .euclidean-step');
                if (!cells.length) return;
                const active = stepIndex % cells.length;
                cells.forEach((c, i) => {
                    if (i === active) c.classList.add('playhead');
                    else c.classList.remove('playhead');
                });
            }, delay);
        }

        function clearEuclidPlayhead() {
            document.querySelectorAll('#euclideanViz .euclidean-step.playhead')
                .forEach((c) => c.classList.remove('playhead'));
        }

        function scheduleStep(stepIndex, when) {
            const cell = state.grid[stepIndex] || [];
            cell.forEach((v) => triggerVoice(audioContext, masterGain, v.note, v.velocity, when, v.instrument));
            highlightEuclidStep(stepIndex, when);
        }

        function transportTick() {
            if (!transport.running) return;
            while (transport.nextTime < audioContext.currentTime + LOOKAHEAD) {
                scheduleStep(transport.current, transport.nextTime);
                transport.nextTime += stepDuration();
                transport.current = (transport.current + 1) % Math.max(1, state.steps);
            }
            transport.timer = setTimeout(transportTick, TICK_MS);
        }

        function startTransport() {
            if (transport.running) return;
            if (audioContext.state === 'suspended') audioContext.resume();
            rebuildGrid();
            transport.running = true;
            transport.current = 0;
            transport.nextTime = audioContext.currentTime + 0.06;
            state.isPlaying = true;
            transportTick();
        }

        function stopTransport() {
            transport.running = false;
            if (transport.timer) { clearTimeout(transport.timer); transport.timer = null; }
            state.isPlaying = false;
            clearEuclidPlayhead();
        }

        // ===== AUDIO SYNTHESIS =====
        // One voice generator, scheduled on an audio clock so the live transport
        // and the offline (export) render produce identical sound.

        function noiseSource(ctx, seconds) {
            const n = Math.max(1, Math.floor(ctx.sampleRate * seconds));
            const buf = ctx.createBuffer(1, n, ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
            const src = ctx.createBufferSource();
            src.buffer = buf;
            return src;
        }

        // Percussion synth. Maps the GM-ish drum numbers used by the Drums map
        // (and the Euclidean pulse) to synthesized hits.
        function triggerDrum(ctx, dest, note, gainScale, when) {
            const v = Math.max(0.05, Math.min(1, gainScale));
            if (note <= 36) {
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.frequency.setValueAtTime(150, when);
                o.frequency.exponentialRampToValueAtTime(45, when + 0.12);
                g.gain.setValueAtTime(0.0001, when);
                g.gain.exponentialRampToValueAtTime(0.9 * v, when + 0.005);
                g.gain.exponentialRampToValueAtTime(0.0001, when + 0.28);
                o.connect(g); g.connect(dest);
                o.start(when); o.stop(when + 0.32);
                return;
            }
            if (note === 38 || note === 39 || note === 40 || note === 49 || note === 51 || note === 53 || note === 55) {
                const bright = note >= 49;
                const dur = bright ? 0.4 : 0.18;
                const src = noiseSource(ctx, dur + 0.05);
                const hp = ctx.createBiquadFilter();
                hp.type = 'highpass';
                hp.frequency.value = bright ? 6000 : 1800;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.0001, when);
                g.gain.exponentialRampToValueAtTime(0.6 * v, when + 0.004);
                g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
                src.connect(hp); hp.connect(g); g.connect(dest);
                src.start(when); src.stop(when + dur + 0.05);
                if (!bright) {
                    const o = ctx.createOscillator(), og = ctx.createGain();
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(180, when);
                    og.gain.setValueAtTime(0.0001, when);
                    og.gain.exponentialRampToValueAtTime(0.3 * v, when + 0.004);
                    og.gain.exponentialRampToValueAtTime(0.0001, when + 0.12);
                    o.connect(og); og.connect(dest);
                    o.start(when); o.stop(when + 0.14);
                }
                return;
            }
            const open = note === 46;
            const dur = open ? 0.3 : 0.06;
            const src = noiseSource(ctx, dur + 0.05);
            const hp = ctx.createBiquadFilter();
            hp.type = 'highpass';
            hp.frequency.value = 8000;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, when);
            g.gain.exponentialRampToValueAtTime(0.35 * v, when + 0.003);
            g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
            src.connect(hp); hp.connect(g); g.connect(dest);
            src.start(when); src.stop(when + dur + 0.05);
        }

        // Pitched synth voice. Timbre depends on the active instrument map.
        function triggerVoice(ctx, dest, note, velocity, when, instrument) {
            if (instrument === 'drums') {
                triggerDrum(ctx, dest, note, Math.max(1, Math.min(127, velocity)) / 127, when);
                return;
            }
            const v = Math.max(1, Math.min(127, velocity)) / 127;
            const freq = 440 * Math.pow(2, (note - 69) / 12);
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            let type = 'sine', dur = 0.5, peak = 0.3 * v;
            if (instrument === 'piano') { type = 'triangle'; dur = 0.6; peak = 0.28 * v; }
            else if (instrument === 'synth') { type = 'sawtooth'; dur = 0.45; peak = 0.20 * v; }
            osc.type = type;
            osc.frequency.setValueAtTime(freq, when);
            let node = osc;
            if (instrument === 'synth') {
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.setValueAtTime(Math.min(9000, freq * 6), when);
                lp.Q.value = 6;
                osc.connect(lp);
                node = lp;
                // Detuned second oscillator for width (+4 cents)
                const osc2 = ctx.createOscillator();
                const lp2 = ctx.createBiquadFilter();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(freq * Math.pow(2, 4 / 1200), when);
                lp2.type = 'lowpass';
                lp2.frequency.setValueAtTime(Math.min(9000, freq * 6), when);
                lp2.Q.value = 6;
                osc2.connect(lp2);
                lp2.connect(gain);
                osc2.start(when);
                osc2.stop(when + dur + 0.05);
            }
            if (instrument === 'piano') {
                // Octave partial for body
                const osc2 = ctx.createOscillator();
                const g2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(freq * 2, when);
                g2.gain.setValueAtTime(0.0001, when);
                g2.gain.exponentialRampToValueAtTime(Math.max(0.001, peak * 0.28), when + 0.010);
                g2.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.65);
                osc2.connect(g2);
                g2.connect(dest);
                osc2.start(when);
                osc2.stop(when + dur + 0.05);
            }
            gain.gain.setValueAtTime(0.0001, when);
            gain.gain.exponentialRampToValueAtTime(Math.max(0.001, peak), when + 0.012);
            gain.gain.exponentialRampToValueAtTime(0.0001, when + dur);
            node.connect(gain);
            gain.connect(dest);
            osc.start(when);
            osc.stop(when + dur + 0.05);
        }

        // Public realtime trigger used by pads, MIDI input, and one-shot previews.
        function playNote(note, velocity) {
            if (audioContext.state === 'suspended') audioContext.resume();
            triggerVoice(audioContext, masterGain, note, velocity, audioContext.currentTime, state.currentInstrument);
        }

        function recordNote(note, velocity) {
            if (!state.isRecording) return;
            state.recordedNotes.push({
                note,
                velocity,
                time: Date.now()
            });
        }

        // ===== MIDI INPUT =====
        function onMidiSuccess(midiAccess) {
            for (let input of midiAccess.inputs.values()) {
                input.onmidimessage = handleMidiMessage;
            }
        }

        function onMidiFailure() {
            console.log('MIDI not supported');
        }

        function handleMidiMessage(message) {
            const [status, note, velocity] = message.data;
            const isNoteOn = (status & 0xf0) === 0x90 && velocity > 0;

            if (isNoteOn) {
                playNote(note, velocity);
                recordNote(note, velocity);
                highlightPad(note);
            }
        }

        function highlightPad(note) {
            document.querySelectorAll('.pad').forEach(pad => {
                if (parseInt(pad.dataset.note) === note) {
                    pad.classList.add('heat');
                    setTimeout(() => pad.classList.remove('heat'), 400);
                }
            });
        }

        // ===== EUCLIDEAN RHYTHM =====
        // True Bjorklund algorithm: distributes `density` pulses as evenly as
        // possible across `length` steps (the actual Euclidean rhythm, e.g.
        // E(3,8)=10010010, E(5,8)=10110110).
        function euclideanPattern(density, length) {
            length = Math.max(1, length | 0);
            density = Math.max(0, Math.min(length, density | 0));
            if (density === 0) return new Array(length).fill(0);
            if (density === length) return new Array(length).fill(1);
            let groups = [];
            for (let i = 0; i < density; i++) groups.push([1]);
            let remainders = [];
            for (let i = 0; i < length - density; i++) remainders.push([0]);
            while (remainders.length > 1) {
                const count = Math.min(groups.length, remainders.length);
                const newGroups = [];
                for (let i = 0; i < count; i++) newGroups.push(groups[i].concat(remainders[i]));
                let newRemainders = [];
                if (groups.length > remainders.length) {
                    for (let i = count; i < groups.length; i++) newRemainders.push(groups[i]);
                } else {
                    for (let i = count; i < remainders.length; i++) newRemainders.push(remainders[i]);
                }
                groups = newGroups;
                remainders = newRemainders;
            }
            const flat = [];
            groups.forEach((g) => g.forEach((x) => flat.push(x)));
            remainders.forEach((g) => g.forEach((x) => flat.push(x)));
            return flat.slice(0, length);
        }

        function renderEuclidean() {
            const density = parseInt(document.getElementById('euclideanDensity').value) || 0;
            const length = parseInt(document.getElementById('euclideanLength').value) || 1;
            state.euclidDensity = density;
            state.euclidLength = length;
            const pattern = euclideanPattern(density, length);
            const viz = document.getElementById('euclideanViz');
            viz.innerHTML = pattern.map((step, i) =>
                `<div class="euclidean-step ${step ? 'active' : ''}"></div>`
            ).join('');
            rebuildGrid();
        }

        document.getElementById('euclideanDensity').addEventListener('change', renderEuclidean);
        document.getElementById('euclideanLength').addEventListener('change', renderEuclidean);

        // ===== TRACK MANAGEMENT =====
        function saveTrack() {
            if (!state.recordedNotes.length) return;
            const track = {
                id: Date.now(),
                name: `Loop ${state.tracks.length + 1}`,
                notes: [...state.recordedNotes],
                duration: state.recordedNotes.length > 0 ? state.recordedNotes[state.recordedNotes.length - 1].time : 0,
                instrument: state.currentInstrument,
                armed: true
            };
            state.tracks.push(track);
            renderTracks();
            rebuildGrid();
        }

        function renderTracks() {
            const container = document.getElementById('trackList');
            if (state.tracks.length === 0) {
                container.innerHTML = '<div class="empty-state">⚬ No loops yet</div>';
                return;
            }
            container.innerHTML = state.tracks.map(track => {
                const armed = track.armed !== false;
                const inst = track.instrument || 'piano';
                return `
                <div class="track-item ${armed ? 'armed' : ''}" data-id="${track.id}" title="click to ${armed ? 'mute' : 'arm'}">
                    <span class="track-label">${track.name}</span>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <span class="track-arm">${armed ? 'ARMED' : 'MUTED'} · ${inst}</span>
                        <span class="track-stats">${track.notes.length}n</span>
                        <button class="file-delete" onclick="deleteTrack(${track.id})">✕</button>
                    </div>
                </div>`;
            }).join('');
            container.querySelectorAll('.track-item').forEach((el) => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.file-delete')) return;
                    const id = Number(el.dataset.id);
                    const tr = state.tracks.find((t) => t.id === id);
                    if (!tr) return;
                    tr.armed = tr.armed === false;
                    renderTracks();
                    rebuildGrid();
                });
            });
        }

        window.deleteTrack = function(id) {
            state.tracks = state.tracks.filter(t => t.id !== id);
            renderTracks();
            rebuildGrid();
        };

        // ===== AI GENERATION (OpenRouter) =====
        async function generateAI() {
            const prompt = (document.getElementById('aiPrompt').value || 'dark ambient').trim();
            const model = (document.getElementById('aiModel').value || 'openai/gpt-4o-mini').trim();
            const key = (document.getElementById('aiKey').value || '').trim();
            const status = document.getElementById('aiStatus');
            const map = state.instrumentMaps[state.currentInstrument];
            const msPerBeat = (60 / state.tempo) * 1000;

            function commit(notes, label) {
                const track = { id: Date.now(), name: label, notes, duration: 16 * msPerBeat, instrument: state.currentInstrument, armed: true };
                state.tracks.push(track);
                renderTracks();
                rebuildGrid();
                playSequence(notes);
            }

            // No key -> local generative fallback so the button still does something.
            if (!key) {
                const notes = [];
                for (let i = 0; i < 16; i++) {
                    notes.push({ note: map[Math.floor(Math.random() * map.length)], velocity: 60 + Math.random() * 67, time: Date.now() + i * msPerBeat });
                }
                commit(notes, 'Local-' + prompt.slice(0, 6));
                status.textContent = 'local pattern - add an OpenRouter key for real AI';
                status.className = 'status-line warning';
                setTimeout(() => { status.textContent = ''; }, 3500);
                return;
            }

            status.textContent = 'Summoning ' + model.split('/').pop() + '...';
            status.className = 'status-line warning';

            const allowed = map.join(', ');
            const sys = 'You are a generative music engine for an alien instrument. Output ONLY raw JSON, no prose, no markdown fences. Schema: {"steps":[{"note":int,"vel":int}]} with up to 16 steps. note MUST be a MIDI number chosen from this allowed set: [' + allowed + ']. vel is 1..127. Phrase it musically to express the requested vibe; you may emit fewer than 16 steps to leave rests.';
            const usr = 'Vibe: ' + prompt + '. Scale/instrument: ' + state.currentInstrument + '. Tempo: ' + state.tempo + ' BPM. Return JSON only.';

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: model, temperature: 0.9, messages: [{ role: 'system', content: sys }, { role: 'user', content: usr }] })
                });
                if (!res.ok) {
                    let msg = 'HTTP ' + res.status;
                    try { const ej = await res.json(); if (ej && ej.error && ej.error.message) msg = ej.error.message; } catch (e) {}
                    throw new Error(msg);
                }
                const data = await res.json();
                const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
                const clean = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                const a = clean.indexOf('{'), b = clean.lastIndexOf('}');
                const json = JSON.parse(a >= 0 ? clean.slice(a, b + 1) : clean);
                const allowedSet = new Set(map);
                const steps = (json.steps || []).filter((s) => s && Number.isFinite(s.note)).slice(0, 16);
                const notes = steps.map((s, i) => {
                    let n = s.note | 0;
                    if (!allowedSet.has(n)) n = map[((n % map.length) + map.length) % map.length];
                    return { note: n, velocity: Math.max(1, Math.min(127, (s.vel | 0) || 90)), time: Date.now() + i * msPerBeat };
                });
                if (!notes.length) throw new Error('empty phrase');
                commit(notes, 'AI-' + prompt.slice(0, 6));
                status.textContent = 'Summoned ' + notes.length + ' notes';
                status.className = 'status-line success';
                setTimeout(() => { status.textContent = ''; }, 3000);
            } catch (e) {
                status.textContent = 'Summon failed: ' + ((e && e.message) ? e.message : e);
                status.className = 'status-line error';
            }
        }

                // ===== FILE MANAGEMENT =====
        function handleFiles(files) {
            for (let file of files) {
                if (/\.(wav|mp3|mid|midi)$/i.test(file.name)) {
                    state.uploadedFiles.push(file);
                }
            }
            renderFileList();
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            if (state.uploadedFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = state.uploadedFiles.map((file, idx) => `
                <div class="file-item">
                    <span class="file-name">${file.name}</span>
                    <button class="file-delete" onclick="deleteFile(${idx})">✕</button>
                </div>
            `).join('');
        }

        window.deleteFile = function(idx) {
            state.uploadedFiles.splice(idx, 1);
            renderFileList();
        };

        // ===== EXPORT FUNCTIONS =====
        const EXPORT_CYCLES = 2; // how many loops of the grid to bounce down

        function gridHasVoices() {
            return (state.grid || []).some((c) => c && c.length);
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
        }

        // Render the current grid to a real PCM buffer with the SAME voice
        // generators the live transport uses, so the file sounds like the toy.
        function renderToBuffer(cycles) {
            rebuildGrid();
            const steps = Math.max(1, state.steps);
            const dur = stepDuration();
            const sr = 44100;
            const total = steps * dur * cycles + 0.6;
            const off = new OfflineAudioContext(2, Math.max(1, Math.ceil(total * sr)), sr);
            const m = off.createGain();
            m.gain.value = 0.85;
            m.connect(off.destination);
            for (let c = 0; c < cycles; c++) {
                for (let s = 0; s < steps; s++) {
                    const when = (c * steps + s) * dur + 0.03;
                    (state.grid[s] || []).forEach((v) => triggerVoice(off, m, v.note, v.velocity, when, v.instrument));
                }
            }
            return off.startRendering();
        }

        // 16-bit PCM WAV encoder (44-byte header + interleaved samples).
        function encodeWAV(buffer) {
            const numCh = buffer.numberOfChannels;
            const sr = buffer.sampleRate;
            const len = buffer.length;
            const blockAlign = numCh * 2;
            const dataSize = len * blockAlign;
            const ab = new ArrayBuffer(44 + dataSize);
            const view = new DataView(ab);
            let p = 0;
            const str = (s) => { for (let i = 0; i < s.length; i++) view.setUint8(p++, s.charCodeAt(i)); };
            const u32 = (v) => { view.setUint32(p, v, true); p += 4; };
            const u16 = (v) => { view.setUint16(p, v, true); p += 2; };
            str('RIFF'); u32(36 + dataSize); str('WAVE');
            str('fmt '); u32(16); u16(1); u16(numCh); u32(sr); u32(sr * blockAlign); u16(blockAlign); u16(16);
            str('data'); u32(dataSize);
            const chans = [];
            for (let c = 0; c < numCh; c++) chans.push(buffer.getChannelData(c));
            for (let i = 0; i < len; i++) {
                for (let c = 0; c < numCh; c++) {
                    let s = Math.max(-1, Math.min(1, chans[c][i]));
                    view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7fff, true);
                    p += 2;
                }
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        function exportWAV() {
            rebuildGrid();
            const status = document.getElementById('exportStatus');
            if (!gridHasVoices()) {
                status.textContent = 'Nothing to crystallize - record a loop, summon a pattern, or raise density.';
                status.className = 'status-line error';
                return;
            }
            status.textContent = 'Crystallizing...';
            status.className = 'status-line warning';
            renderToBuffer(EXPORT_CYCLES).then((buf) => {
                downloadBlob(encodeWAV(buf), 'void-scale-output.wav');
                status.textContent = '✓ Crystallized (' + buf.duration.toFixed(1) + 's WAV)';
                status.className = 'status-line success';
            }).catch((e) => {
                status.textContent = 'Render failed: ' + ((e && e.message) ? e.message : e);
                status.className = 'status-line error';
            });
        }

        // Variable-length quantity (MIDI delta-time encoding).
        function midiVLQ(value) {
            const bytes = [value & 0x7f];
            value = Math.floor(value / 128);
            while (value > 0) {
                bytes.unshift((value & 0x7f) | 0x80);
                value = Math.floor(value / 128);
            }
            return bytes;
        }

        // Real Standard MIDI File: 480 PPQ, tempo meta, drums on channel 10,
        // melodic voices on channel 1.
        function exportMIDI() {
            rebuildGrid();
            const status = document.getElementById('exportStatus');
            if (!gridHasVoices()) {
                status.textContent = 'Nothing to encode - record a loop, summon a pattern, or raise density.';
                status.className = 'status-line error';
                return;
            }
            status.textContent = 'Encoding...';
            status.className = 'status-line warning';
            try {
                const PPQ = 480;
                const steps = Math.max(1, state.steps);
                const ticksPerStep = Math.max(1, Math.round(PPQ * 4 / (state.noteDivision || 8)));
                const events = [];
                for (let c = 0; c < EXPORT_CYCLES; c++) {
                    for (let s = 0; s < steps; s++) {
                        const onTick = (c * steps + s) * ticksPerStep;
                        const offTick = onTick + ticksPerStep;
                        (state.grid[s] || []).forEach((v) => {
                            const ch = v.instrument === 'drums' ? 9 : 0;
                            const vel = Math.max(1, Math.min(127, v.velocity | 0));
                            const note = v.note & 0x7f;
                            events.push({ tick: onTick, order: 1, bytes: [0x90 | ch, note, vel] });
                            events.push({ tick: offTick, order: 0, bytes: [0x80 | ch, note, 0] });
                        });
                    }
                }
                events.sort((a, b) => (a.tick - b.tick) || (a.order - b.order));
                const track = [];
                const usPerQuarter = Math.round(60000000 / Math.max(1, state.tempo));
                track.push.apply(track, midiVLQ(0));
                track.push(0xff, 0x51, 0x03, (usPerQuarter >> 16) & 0xff, (usPerQuarter >> 8) & 0xff, usPerQuarter & 0xff);
                let last = 0;
                events.forEach((e) => {
                    track.push.apply(track, midiVLQ(e.tick - last));
                    last = e.tick;
                    track.push.apply(track, e.bytes);
                });
                track.push.apply(track, midiVLQ(0));
                track.push(0xff, 0x2f, 0x00);
                const header = [0x4d, 0x54, 0x68, 0x64, 0, 0, 0, 6, 0, 0, 0, 1, (PPQ >> 8) & 0xff, PPQ & 0xff];
                const tlen = track.length;
                const trkHeader = [0x4d, 0x54, 0x72, 0x6b, (tlen >> 24) & 0xff, (tlen >> 16) & 0xff, (tlen >> 8) & 0xff, tlen & 0xff];
                const out = new Uint8Array(header.length + trkHeader.length + tlen);
                out.set(header, 0);
                out.set(trkHeader, header.length);
                out.set(track, header.length + trkHeader.length);
                downloadBlob(new Blob([out], { type: 'audio/midi' }), 'void-scale-output.mid');
                status.textContent = '✓ Exported (' + events.length / 2 + ' notes, SMF)';
                status.className = 'status-line success';
            } catch (e) {
                status.textContent = 'Encode failed: ' + ((e && e.message) ? e.message : e);
                status.className = 'status-line error';
            }
        }

        // ===== VISUALIZATION =====
        function drawOuroboros() {
            const canvas = document.getElementById('ouroboros');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 10;
            const phase = (Date.now() % 4000) / 4000;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ouroboros circle
            ctx.strokeStyle = `rgba(157, 78, 221, ${0.3 + Math.sin(phase * Math.PI * 2) * 0.2})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();

            // Rotating pulse
            const pulseX = centerX + Math.cos(phase * Math.PI * 2) * radius;
            const pulseY = centerY + Math.sin(phase * Math.PI * 2) * radius;

            ctx.fillStyle = `rgba(0, 255, 65, ${0.5 + Math.sin(phase * Math.PI * 2) * 0.3})`;
            ctx.beginPath();
            ctx.arc(pulseX, pulseY, 5, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(drawOuroboros);
        }

        function drawWaveform() {
            const canvas = document.getElementById('waveform');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(15, 20, 25, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = `rgba(0, 255, 65, 0.8)`;
            ctx.lineWidth = 1;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataArray.length;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128;
                const y = (v * canvas.height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                x += sliceWidth;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            requestAnimationFrame(drawWaveform);
        }

        function midiToNote(midiNote) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const octave = Math.floor(midiNote / 12) - 1;
            const noteIdx = midiNote % 12;
            return notes[noteIdx] + octave;
        }

        // ===== PLAYBACK OF A GENERATED SEQUENCE =====
        function playSequence(notes) {
            if (!notes || !notes.length) return;
            if (audioContext.state === 'suspended') audioContext.resume();
            const t0 = notes[0].time;
            notes.forEach((n) => {
                const delay = Math.max(0, n.time - t0);
                setTimeout(() => playNote(n.note, n.velocity), delay);
            });
        }

        // ===== DOWNLOAD THIS PAGE =====
        function downloadSelfHtml() {
            const name = 'voidscale_labs.html';
            function dl(html) {
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1500);
            }
            fetch(location.href).then((r) => r.text()).then(dl).catch(() => dl('<!DOCTYPE html>\n' + document.documentElement.outerHTML));
        }

        // Start
        init();
    </script>
</body>
